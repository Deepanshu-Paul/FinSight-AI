name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finsight-ai .

      - name: Run container
        run: docker run -d -p 8000:8000 --name test-container finsight-ai

      - name: Wait for container startup
        run: sleep 15

      - name: Check container status
        run: |
          echo "==== Docker PS ===="
          docker ps -a
          echo "==== Container Running Status ===="
          docker inspect -f '{{.State.Running}}' test-container || true

      - name: Show container logs (IMPORTANT)
        run: docker logs test-container || true

      - name: Fail if container stopped
        run: |
          STATUS=$(docker inspect -f '{{.State.Running}}' test-container)
          if [ "$STATUS" != "true" ]; then
            echo "❌ Container is not running!"
            exit 1
          else
            echo "✅ Container is running"
          fi

      - name: Test health endpoint
        run: curl http://localhost:8000/health
