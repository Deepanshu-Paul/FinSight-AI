name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t finsight-ai .

      - name: Run container
        run: docker run -d -p 8000:8000 finsight-ai

      - name: Wait for startup
        run: sleep 10

      - name: Health check
        run: curl http://localhost:8000/health
